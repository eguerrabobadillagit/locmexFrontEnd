<div class="fleet-tracking-container">
  @switch (sidebarViewMode()) {
    @case ('history') {
      <!-- Loading Overlay -->
      @if (isLoadingHistory()) {
        <div class="sidebar-loading-overlay">
          <ion-spinner name="crescent"></ion-spinner>
          <p>Cargando historial...</p>
        </div>
      }

      @if (historyError()) {
        <div class="history-error">
          <ion-icon name="alert-circle-outline"></ion-icon>
          <p>{{ historyError() }}</p>
          <button class="retry-btn" (click)="onBackToHistoryForm()">Volver</button>
        </div>
      }

      @if (!isLoadingHistory() && !historyError()) {
        @switch (historySubViewMode()) {
          @case ('route') {
            <app-vehicle-history-route
              [vehicleId]="selectedHistoryVehicle()?.id || ''"
              [vehiclePlate]="selectedHistoryVehicle()?.plate || ''"
              [fromDate]="getHistoryFromDate()"
              [fromHour]="getHistoryFromHour()"
              [fromMinute]="getHistoryFromMinute()"
              [toDate]="getHistoryToDate()"
              [toHour]="getHistoryToHour()"
              [toMinute]="getHistoryToMinute()"
              [historyPointsData]="historyPoints()"
              [formattedPointsData]="formattedHistoryPoints()"
              [totalDistance]="totalHistoryDistance()"
              [totalDuration]="totalHistoryDuration()"
              [totalPoints]="totalHistoryPoints()"
              (closeRoute)="closeHistoryView()"
              (backToForm)="onBackToHistoryForm()"
              (pointSelect)="onHistoryPointSelect($event)" />
          }
          @default {
            <app-vehicle-history-form
              [vehicleId]="selectedHistoryVehicle()?.id || ''"
              [vehiclePlate]="selectedHistoryVehicle()?.plate || ''"
              (closeForm)="closeHistoryView()"
              (searchHistory)="onHistorySearch($event)" />
          }
        }
      }
    }
    @default {
      <app-units-list
        [vehicles]="vehicles()"
        [isLoading]="isLoading()"
        [error]="error()"
        [viewMode]="viewMode()"
        (vehicleClick)="onVehicleSelect($event)"
        (viewModeToggle)="onViewModeToggle()"
        (close)="closeView.emit()"
        (retry)="onRetryLoad()"
        (openHistory)="onOpenHistoryClicked($event)"
        (openStreetView)="onOpenStreetViewClicked($event)">
      </app-units-list>
    }
  }
</div>
