<div class="page-container">
  <app-page-header
    title="Clientes"
    subtitle="Gestión de clientes en la plataforma"
    actionLabel="Crear Cliente"
    actionIcon="add-outline"
    (actionClick)="onCreateClient()"
  />

  <app-data-toolbar
    [filterOptions]="filterOptions"
    searchPlaceholder="Buscar clientes..."
    [showViewToggle]="true"
    (filterChange)="onFilterChange($event)"
    (searchChange)="onQuickFilterChange($event)"
  />

  <div class="grid-container">
    <ag-grid-angular
      class="ag-theme-quartz"
      [rowData]="filteredClients()"
      [columnDefs]="columnDefs"
      [gridOptions]="gridOptions"
      [quickFilterText]="quickFilterText()"
      (gridReady)="onGridReady($event)"
    ></ag-grid-angular>
  </div>

  <ion-modal 
    [isOpen]="showClientWizard()" 
    (didDismiss)="onWizardClose()">
    <ng-template>
      <app-form-client-wizard
        #clientWizard
        [clientId]="selectedClientId()"
        (clientSubmitted)="onClientCreated($event)"
        (wizardCancelled)="onWizardClose()">
      </app-form-client-wizard>
    </ng-template>
  </ion-modal>
</div>
