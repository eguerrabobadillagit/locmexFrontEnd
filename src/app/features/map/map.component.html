<div class="map-container">
  <google-map
    [center]="center"
    [zoom]="zoom"
    [options]="mapOptions"
    width="100%"
    height="100%">
    
    @for (marker of markers(); track marker.id) {
      <map-marker 
        [position]="marker.position"
        [title]="marker.title"
        [options]="{ icon: marker.icon }"
        (mapClick)="onMarkerClick(marker.id)">
      </map-marker>
    }
  </google-map>

  <!-- Vehicle Detail Panel -->
  @if (showVehicleDetail() && selectedVehicleDetail()) {
    <div class="vehicle-detail-panel">
      <app-vehicle-detail 
        [vehicle]="selectedVehicleDetail()!"
        (close)="onCloseVehicleDetail()">
      </app-vehicle-detail>
    </div>
  }
</div>
