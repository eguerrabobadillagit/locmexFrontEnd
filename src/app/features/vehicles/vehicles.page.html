<div class="vehicles-container">
  <app-page-header
    title="Gestión de Vehículos"
    subtitle="Control y monitoreo de flota"
    actionLabel="Agregar Vehículo"
    actionIcon="add-outline"
    (actionClick)="onAddVehicle()"
  />

  <app-data-toolbar
    searchPlaceholder="Buscar por placa, conductor o modelo..."
    filterLabel="Todos los estados"
    [filterOptions]="filterOptions"
    [showViewToggle]="true"
    (searchChange)="onSearch($event)"
    (filterChange)="onFilterChange($event)"
    (viewChange)="onViewChange($event)"
  />

  <div class="grid-container">
    <ag-grid-angular
      style="width: 100%; height: 100%;"
      class="ag-theme-quartz"
      [rowData]="filteredVehicles()"
      [columnDefs]="columnDefs"
      [gridOptions]="gridOptions"
      [quickFilterText]="quickFilterText()">
    </ag-grid-angular>
  </div>

  <!-- Modal para agregar/editar vehículo -->
  <ion-modal 
    [isOpen]="showVehicleWizard()" 
    (didDismiss)="onWizardClose()">
    <ng-template>
      <app-form-vehicle-wizard
        [vehicleId]="selectedVehicleId()"
        (wizardClosed)="onWizardClose()"
        (vehicleCreated)="onVehicleCreated($event)"
        (vehicleUpdated)="onVehicleUpdated($event)">
      </app-form-vehicle-wizard>
    </ng-template>
  </ion-modal>
</div>
